<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Invert GIF Maker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.preview{
    margin-top:20px;
}

#previewImage{
    max-width:500px;
    max-height:500px;
    border:2px solid #444;
    border-radius:10px;
}

input[type=range]{
    width:350px;
}

button{
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
    font-size:16px;
}

progress{
    width:350px;
    height:25px;
}

#downloadBtn{
    display:none;
    color:#00ff88;
    font-size:18px;
}
</style>

</head>
<body>

<div class="container">

<h1>Invert GIF Maker</h1>

<input type="file" id="fileInput" accept="image/*">

<br><br>

<label>
Delay Between Frames:
</label>

<br>

<input
type="range"
id="delaySlider"
min="100"
max="2000"
value="300"
step="50">

<div>
<span id="delayValue">300</span> ms
</div>

<div class="preview">
<h3>Live Preview</h3>

<img id="previewImage">
</div>

<br>

<button id="generateBtn" disabled>
Generate GIF
</button>

<br>

<progress id="progressBar" value="0" max="100"></progress>

<div id="status">
Upload an image
</div>

<br>

<a id="downloadBtn" download="flashing.gif">
Download GIF
</a>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const previewImage = document.getElementById("previewImage");

const delaySlider = document.getElementById("delaySlider");
const delayValue = document.getElementById("delayValue");

const generateBtn = document.getElementById("generateBtn");

const progressBar = document.getElementById("progressBar");
const statusText = document.getElementById("status");

const downloadBtn = document.getElementById("downloadBtn");

let originalCanvas;
let invertedCanvas;

let originalDataURL;
let invertedDataURL;

let previewInterval;

function startPreview(){

    clearInterval(previewInterval);

    let showingOriginal = true;

    previewImage.src = originalDataURL;

    previewInterval = setInterval(()=>{

        if(showingOriginal){
            previewImage.src = invertedDataURL;
        }else{
            previewImage.src = originalDataURL;
        }

        showingOriginal = !showingOriginal;

    }, Number(delaySlider.value));

}

delaySlider.addEventListener("input",()=>{

    delayValue.textContent = delaySlider.value;

    if(originalDataURL){
        startPreview();
    }
});

fileInput.addEventListener("change",(e)=>{

    const file = e.target.files[0];

    if(!file) return;

    statusText.textContent = "Loading image...";

    const img = new Image();

    img.onload = ()=>{

        originalCanvas = document.createElement("canvas");
        originalCanvas.width = img.width;
        originalCanvas.height = img.height;

        const ctx = originalCanvas.getContext("2d");
        ctx.drawImage(img,0,0);

        originalDataURL = originalCanvas.toDataURL();

        invertedCanvas = document.createElement("canvas");
        invertedCanvas.width = img.width;
        invertedCanvas.height = img.height;

        const ictx = invertedCanvas.getContext("2d");
        ictx.drawImage(img,0,0);

        const imageData = ictx.getImageData(
            0,
            0,
            img.width,
            img.height
        );

        const data = imageData.data;

        for(let i=0;i<data.length;i+=4){

            data[i] = 255 - data[i];
            data[i+1] = 255 - data[i+1];
            data[i+2] = 255 - data[i+2];
        }

        ictx.putImageData(imageData,0,0);

        invertedDataURL = invertedCanvas.toDataURL();

        startPreview();

        generateBtn.disabled = false;

        statusText.textContent =
            "Preview running. Adjust speed if needed.";
    };

    img.src = URL.createObjectURL(file);
});

generateBtn.addEventListener("click",()=>{

    progressBar.value = 0;
    downloadBtn.style.display = "none";

    statusText.textContent =
        "Creating GIF...";

    const gif = new GIF({

        workers:2,

        quality:10,

        repeat:0,

        workerScript:"gif.worker.js"
    });

    gif.addFrame(originalCanvas,{
        delay:Number(delaySlider.value)
    });

    gif.addFrame(invertedCanvas,{
        delay:Number(delaySlider.value)
    });

    gif.on("progress",(p)=>{

        const percent =
            Math.round(p*100);

        progressBar.value = percent;

        statusText.textContent =
            "Encoding GIF... " +
            percent + "%";
    });

    gif.on("finished",(blob)=>{

        const url =
            URL.createObjectURL(blob);

        downloadBtn.href = url;

        downloadBtn.style.display =
            "inline-block";

        progressBar.value = 100;

        statusText.textContent =
            "GIF Ready ✓";
    });

    gif.render();
});

</script>

</body>
</html>
